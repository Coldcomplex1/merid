# Security gate for every PR into main (and pushes to main):
#   1. audit      – npm audit (high+) on web app and extension dependencies (A06)
#   2. build      – web build + extension lint/tests must stay green
#   3. rules-test – firestore.rules regression tests on the Firestore emulator (A01/A04)
#   4. codeql     – SAST scan of all JavaScript/TypeScript (extension + web)
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Audit web app dependencies
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Audit extension dependencies
        working-directory: merid-extension-final
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high

  build:
    name: Build & extension checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build web app
        run: |
          npm ci
          npm run build
      - name: Lint + test extension
        working-directory: merid-extension-final
        run: |
          npm run lint
          npm test

  rules-test:
    name: Firestore security-rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Run rules tests on the emulator
        run: |
          npm ci
          npm install -g firebase-tools
          npm run test:rules

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
