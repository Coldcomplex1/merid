<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Theme bootstrap: runs before first paint so the saved (or system) theme is
      applied to <html> immediately and there is no flash of the wrong theme.
      Keep the storage key, colours and logic in sync with src/theme/ThemeContext.tsx.
    -->
    <meta name="theme-color" content="#faf8f2" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('merid-theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = theme;
          root.style.backgroundColor = theme === 'dark' ? '#0e1628' : '#faf8f2';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0e1628' : '#faf8f2');
        } catch (e) {}
      })();
    </script>

    <title>Merid: Học từ vựng tiếng Anh ngay khi đọc web tiếng Việt</title>
    <meta
      name="description"
      content="Đã có trên Chrome Web Store. Merid là extension giúp bạn học SAT, B2, C1, C2 vocab tự nhiên bằng cách thay vài từ tiếng Việt bằng tiếng Anh khi bạn lướt web."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://merid.site/" />

    <!--
      Social sharing preview (Open Graph + Twitter/X).
      NOTE: og:url and og:image must be ABSOLUTE production URLs.
      If the domain ever changes, update https://merid.site below.
    -->

    <meta property="og:site_name" content="Merid" />
    <meta property="og:url" content="https://merid.site/" />
    <meta property="og:title" content="Học từ vựng tiếng Anh ngay khi đọc web tiếng Việt" />
    <meta
      property="og:description"
      content="Đã có trên Chrome Web Store. Merid là extension giúp bạn học SAT, B2, C1, C2 vocab tự nhiên bằng cách thay vài từ tiếng Việt bằng tiếng Anh khi bạn lướt web."
    />
    <meta property="og:image" content="https://merid.site/og-card.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Merid: học từ vựng tiếng Anh ngay trong trang web tiếng Việt" />
    <meta property="og:locale" content="vi_VN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Học từ vựng tiếng Anh ngay khi đọc web tiếng Việt" />
    <meta
      name="twitter:description"

    />
    <meta name="twitter:image" content="https://merid.site/og-card.jpg" />

      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Merid",
        "applicationCategory": "BrowserApplication",
        "operatingSystem": "Chrome",
        "url": "https://merid.site/",

  </head>
  <body>
    <div id="root"></div>
